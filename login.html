<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurveyEarn - Login</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#5a4bff,#3a2ca3);
}

/* CONTAINER */
.container{
    text-align:center;
}

/* LOGO */
.logo{
    color:white;
    margin-bottom:10px;
}
.logo i{
    font-size:30px;
    margin-right:8px;
}
.logo span{
    font-size:24px;
    font-weight:600;
}

/* TITLE */
h1{
    color:white;
    font-size:28px;
    margin-top:10px;
}
.subtitle{
    color:#ddd;
    margin:8px 0 30px;
}
.subtitle a{
    color:#ff9d5c;
    text-decoration:none;
}

/* CARD */
.card{
    background:#e6e6e6;
    width:420px;
    padding:30px;
    border-radius:10px;
    text-align:left;
    margin:auto;
}

/* FORM */
.form-group{
    margin-bottom:20px;
}
label{
    font-size:14px;
    color:#333;
    display:block;
    margin-bottom:6px;
}

.input-box{
    display:flex;
    align-items:center;
    background:#f2f2f2;
    border:1px solid #ccc;
    border-radius:6px;
    padding:10px;
}
.input-box i{
    margin-right:10px;
    color:#888;
}
.input-box input{
    border:none;
    outline:none;
    width:100%;
    background:transparent;
    font-size:14px;
}
.eye{
    cursor:pointer;
    color:#888;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
.row label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
}
.row a{
    font-size:14px;
    color:#5a4bff;
    text-decoration:none;
}

/* BUTTON */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    background:linear-gradient(to right,#6a5cff,#ff7a18);
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}
.btn:hover{
    opacity:0.95;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <i class="fa-solid fa-clipboard-list"></i>
        <span>SurveyEarn</span>
    </div>

    <h1>Sign in to your account</h1>
    <div class="subtitle">
        Don't have an account? <a href="#">Sign up</a>
    </div>

    <div class="card">

        <div class="form-group">
            <label>Email address</label>
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="you@example.com">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="••••••••">
                <i class="fa-regular fa-eye eye"></i>
            </div>
        </div>

        <div class="row">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot your password?</a>
        </div>

        <button class="btn">
            Sign in <i class="fa-solid fa-arrow-right"></i>
        </button>

    </div>

</div>

</body>
</html>
